<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Производственные задачи — сравнение месяцев</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      body { background:#f1f5f9; color:#1e293b; }
      .sheet { height: calc(100vh - 230px); min-height: 640px; max-height: 760px; }
      .panel-grid { height: 100%; display:grid; grid-template-rows: 1fr auto; gap:14px; }
      .charts-grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; min-height:0; }
      .chart-box { min-height:0; }
      .chart-wrap { height: 220px; }
      .table-small td, .table-small th { padding:6px 8px; font-size:12px; }
      @media (max-width:1100px){
        .sheet { height:auto; max-height:none; }
        .panel-grid { grid-template-rows:auto; }
        .charts-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body class="font-sans">
    <div class="min-h-screen">
      <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Производственные задачи сотрудников</h1>
            <p class="text-sm text-slate-500">Сравнение февраля и марта по выгрузкам Б24 · версия оформления 3</p>
          </div>
          <div class="flex flex-wrap gap-2 items-center">
            <span id="statusBadge" class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">Читаю файлы…</span>
            <button id="reloadBtn" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm hover:bg-slate-100">Обновить</button>
          </div>
        </div>
      </header>

      <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 space-y-4">
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <div class="flex flex-wrap items-center gap-2" id="tabButtons"></div>
          <p id="sourceInfo" class="text-xs text-slate-500 mt-3"></p>
        </section>

        <section id="mainMetrics" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-3"></section>

        <section id="tab-overview" class="sheet tab-panel"></section>
        <section id="tab-deadlines" class="sheet tab-panel hidden"></section>
        <section id="tab-load" class="sheet tab-panel hidden"></section>
        <section id="tab-quality" class="sheet tab-panel hidden"></section>
      </main>
    </div>

    <script>
      const expectedFiles = {
        prev: "directions_report_prev_month_2026_02.xlsx",
        curr: "directions_report_current_month_2026_03.xlsx"
      };

      const tabs = [
        { id: "tab-overview", title: "1. Общая картина" },
        { id: "tab-deadlines", title: "2. Сроки и просрочки" },
        { id: "tab-load", title: "3. Нагрузка подразделений" },
        { id: "tab-quality", title: "4. Качество исполнения" }
      ];

      const charts = {};
      const byId = (id) => document.getElementById(id);
      const n = (v) => String(v ?? "").toLowerCase().trim();

      const fields = {
        title: ["название", "тема", "задача", "name"],
        created: ["дата создания", "создан", "created"],
        closed: ["дата закрытия", "закрыт", "заверш"],
        deadline: ["срок", "дедлайн", "deadline", "плановая дата"],
        status: ["статус", "состояние", "этап"],
        level: ["уровень", "сложность", "l1", "l2", "l3"],
        unit: ["подразделение", "направление", "отдел", "департамент"],
        owner: ["ответственный", "исполнитель", "менеджер"],
        reason: ["причина", "комментарий", "возврат"]
      };

      function pickColumn(headers, key) {
        for (const h of headers) {
          if (fields[key].some((x) => n(h).includes(x))) return h;
        }
        return null;
      }

      function parseDate(v) {
        if (v == null || v === "") return null;
        if (typeof v === "number") {
          const d = XLSX.SSF.parse_date_code(v);
          return d ? new Date(Date.UTC(d.y, d.m - 1, d.d)) : null;
        }
        const dt = new Date(String(v).replace(/\./g, "-").replace(/\//g, "-"));
        return Number.isNaN(dt.getTime()) ? null : dt;
      }

      const days = (a, b) => (!a || !b ? null : Math.round((b - a) / 86400000));
      const isClosed = (r) => !!r.closed || /закры|выполн/i.test(r.status);
      const isOverdue = (r) => {
        if (!r.deadline) return false;
        if (isClosed(r) && r.closed) return r.closed > r.deadline;
        return !isClosed(r) && new Date() > r.deadline;
      };

      function parseWorkbook(binary, monthTag) {
        const book = XLSX.read(binary, { type: "array" });
        const rows = [];
        const stats = [];

        book.SheetNames.forEach((sheet) => {
          const data = XLSX.utils.sheet_to_json(book.Sheets[sheet], { defval: null });
          if (!data.length) return;
          const headers = Object.keys(data[0]);
          const map = {
            title: pickColumn(headers, "title"),
            created: pickColumn(headers, "created"),
            closed: pickColumn(headers, "closed"),
            deadline: pickColumn(headers, "deadline"),
            status: pickColumn(headers, "status"),
            level: pickColumn(headers, "level"),
            unit: pickColumn(headers, "unit"),
            owner: pickColumn(headers, "owner"),
            reason: pickColumn(headers, "reason")
          };

          data.forEach((r, i) => {
            const levelText = map.level ? String(r[map.level] ?? "") : "";
            const level = (levelText.match(/L[1-3]/i)?.[0] || "Не указан").toUpperCase().replace("L", "Уровень ");
            const closedDate = parseDate(map.closed ? r[map.closed] : null);
            rows.push({
              monthTag,
              sheet,
              title: map.title ? String(r[map.title] ?? `Задача ${i + 1}`) : `Задача ${i + 1}`,
              created: parseDate(map.created ? r[map.created] : null),
              closed: closedDate,
              deadline: parseDate(map.deadline ? r[map.deadline] : null),
              status: map.status ? String(r[map.status] ?? "") : (closedDate ? "Закрыта" : "В работе"),
              level,
              unit: map.unit ? String(r[map.unit] ?? "Не указано") : "Не указано",
              owner: map.owner ? String(r[map.owner] ?? "Не указан") : "Не указан",
              reason: map.reason ? String(r[map.reason] ?? "") : ""
            });
          });

          stats.push({ sheet, count: data.length });
        });

        return { rows, stats };
      }

      function demoData() {
        const units = ["Цех 1", "Цех 2", "Склад", "Логистика", "Ремонт"]; 
        const owners = ["Иванов", "Петров", "Сидоров", "Кузнецов", "Миронов"]; 
        const reasons = ["Ожидание согласования", "Не хватает данных", "Смена приоритета", "Зависимость от смежных"]; 
        const all = [];
        for (const m of ["02", "03"]) {
          for (let i = 1; i <= 220; i++) {
            const created = new Date(`2026-${m}-${String((i % 27) + 1).padStart(2, "0")}`);
            const closed = i % 4 ? new Date(created.getTime() + (2 + (i % 11)) * 86400000) : null;
            const deadline = new Date(created.getTime() + (3 + (i % 8)) * 86400000);
            const status = closed ? (closed > deadline ? "Просрочена" : "Закрыта") : (i % 2 ? "В работе" : "Новая");
            all.push({
              monthTag: `2026-${m}`,
              sheet: "Лист 1",
              title: `Задача ${i}`,
              created, closed, deadline, status,
              level: `Уровень ${(i % 3) + 1}`,
              unit: units[i % units.length],
              owner: owners[i % owners.length],
              reason: status === "Просрочена" ? reasons[i % reasons.length] : ""
            });
          }
        }
        return {
          prev: all.filter((x) => x.monthTag === "2026-02"),
          curr: all.filter((x) => x.monthTag === "2026-03"),
          prevStats: [{ sheet: "Лист 1", count: 220 }],
          currStats: [{ sheet: "Лист 1", count: 220 }]
        };
      }

      function grouped(rows, keyFn) {
        const m = new Map();
        rows.forEach((r) => m.set(keyFn(r), (m.get(keyFn(r)) || 0) + 1));
        return m;
      }
      const topN = (map, n=8) => [...map.entries()].sort((a,b)=>b[1]-a[1]).slice(0,n);
      const avg = (arr) => arr.length ? arr.reduce((s,x)=>s+x,0)/arr.length : 0;
      const destroyChart = (id) => charts[id] && charts[id].destroy();

      function drawTabs() {
        const box = byId("tabButtons");
        box.innerHTML = "";
        tabs.forEach((t, i) => {
          const b = document.createElement("button");
          b.className = `px-3 py-2 rounded-lg text-sm border ${i===0 ? "bg-blue-600 text-white border-blue-600" : "bg-slate-50 border-slate-300 text-slate-700"}`;
          b.textContent = t.title;
          b.onclick = () => {
            document.querySelectorAll(".tab-panel").forEach((p) => p.classList.add("hidden"));
            byId(t.id).classList.remove("hidden");
            [...box.children].forEach((c) => c.className = "px-3 py-2 rounded-lg text-sm border bg-slate-50 border-slate-300 text-slate-700");
            b.className = "px-3 py-2 rounded-lg text-sm border bg-blue-600 text-white border-blue-600";
          };
          box.appendChild(b);
        });
      }

      function metricCard(title, value, note, good=true) {
        return `<article class="bg-white rounded-xl shadow-sm border border-slate-200 p-3"><p class="text-xs text-slate-500">${title}</p><p class="text-2xl font-bold text-slate-900 mt-1">${value}</p><p class="text-xs font-semibold mt-1 ${good ? "text-emerald-600" : "text-rose-600"}">${note}</p></article>`;
      }

      function render(data) {
        const { prev, curr, prevStats, currStats } = data;
        byId("sourceInfo").innerHTML = `Файлы: <b>${expectedFiles.prev}</b> и <b>${expectedFiles.curr}</b>. Строки: февраль — ${prev.length}, март — ${curr.length}. Листы марта: ${currStats.map(s => `${s.sheet}: ${s.count}`).join(", ")}.`;

        const prevClosed = prev.filter(isClosed).length;
        const currClosed = curr.filter(isClosed).length;
        const prevOver = prev.filter(isOverdue).length;
        const currOver = curr.filter(isOverdue).length;
        const prevCycle = prev.map(r => days(r.created, r.closed)).filter(v => v != null);
        const currCycle = curr.map(r => days(r.created, r.closed)).filter(v => v != null);

        byId("mainMetrics").innerHTML = [
          metricCard("Всего задач в марте", curr.length, `${((curr.length - prev.length) / Math.max(prev.length,1) * 100).toFixed(1)}% к февралю`, curr.length >= prev.length),
          metricCard("Закрыто задач", currClosed, `${(currClosed / Math.max(curr.length,1) * 100).toFixed(1)}% от всех`, currClosed >= prevClosed),
          metricCard("Просрочено задач", currOver, `${(currOver / Math.max(curr.length,1) * 100).toFixed(1)}% от всех`, currOver <= prevOver),
          metricCard("Средняя длительность", `${avg(currCycle).toFixed(1)} дн`, `${(avg(currCycle)-avg(prevCycle)).toFixed(1)} дн к февралю`, avg(currCycle) <= avg(prevCycle)),
          metricCard("Открыто на конец месяца", curr.length - currClosed, `${(curr.length-currClosed)-(prev.length-prevClosed)} шт к февралю`, (curr.length-currClosed) <= (prev.length-prevClosed))
        ].join("");

        drawOverview(curr);
        drawDeadlines(curr);
        drawLoad(prev, curr);
        drawQuality(curr);
      }

      function drawOverview(curr) {
        const panel = byId("tab-overview");
        panel.innerHTML = `<div class="panel-grid"><div class="charts-grid"><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Состояния задач</h3><div class="chart-wrap"><canvas id="overviewState"></canvas></div></article><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Уровни сложности</h3><div class="chart-wrap"><canvas id="overviewLevel"></canvas></div></article></div><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4"><h3 class="text-base font-semibold mb-2">Подразделения с наибольшим объёмом задач</h3><table class="table-small" id="overviewTable"></table></article></div>`;

        const statuses = topN(grouped(curr, r => r.status || "Не указан"), 8);
        destroyChart("overviewState");
        charts.overviewState = new Chart(byId("overviewState"), { type:"bar", data:{labels:statuses.map(x=>x[0]), datasets:[{data:statuses.map(x=>x[1]), backgroundColor:"#2563eb", borderRadius:8}]}, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:"#e2e8f0"}},y:{grid:{display:false}}}} });

        const levels = ["Уровень 1","Уровень 2","Уровень 3","НЕ УКАЗАН"];
        destroyChart("overviewLevel");
        charts.overviewLevel = new Chart(byId("overviewLevel"), { type:"doughnut", data:{labels:levels, datasets:[{data:levels.map(l=>curr.filter(r=>r.level===l).length), backgroundColor:["#2563eb", "#0ea5e9", "#8b5cf6", "#94a3b8"]}]}, options:{maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}} });

        const units = topN(grouped(curr, r => r.unit), 8);
        byId("overviewTable").innerHTML = `<thead><tr><th>Подразделение</th><th>Всего</th><th>Просрочено</th></tr></thead><tbody>${units.map(([u,c]) => `<tr><td>${u}</td><td>${c}</td><td>${curr.filter(r=>r.unit===u && isOverdue(r)).length}</td></tr>`).join("")}</tbody>`;
      }

      function drawDeadlines(curr) {
        const panel = byId("tab-deadlines");
        panel.innerHTML = `<div class="panel-grid"><div class="charts-grid"><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Средняя длительность по уровням</h3><div class="chart-wrap"><canvas id="deadlinesTime"></canvas></div></article><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Возраст открытых задач</h3><div class="chart-wrap"><canvas id="deadlinesAge"></canvas></div></article></div><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4"><h3 class="text-base font-semibold mb-2">Наиболее рискованные задачи</h3><table class="table-small" id="deadlinesTable"></table></article></div>`;

        const labels = ["Уровень 1","Уровень 2","Уровень 3"];
        const plan = [2,5,10];
        const fact = labels.map(l => {
          const arr = curr.filter(r=>r.level===l).map(r=>days(r.created,r.closed)).filter(v=>v!=null);
          return arr.length ? +(arr.reduce((s,x)=>s+x,0)/arr.length).toFixed(1) : 0;
        });
        destroyChart("deadlinesTime");
        charts.deadlinesTime = new Chart(byId("deadlinesTime"), { type:"bar", data:{labels, datasets:[{label:"Факт, дни", data:fact, backgroundColor:"#0ea5e9", borderRadius:8}, {label:"План, дни", data:plan, type:"line", borderColor:"#ef4444", borderDash:[6,6], pointRadius:3}]}, options:{maintainAspectRatio:false, scales:{x:{grid:{display:false}},y:{beginAtZero:true, grid:{color:"#e2e8f0"}}}} });

        const buckets = { "0–2 дня":0, "3–7 дней":0, "8–14 дней":0, "15+ дней":0 };
        curr.forEach(r => {
          if (isClosed(r) || !r.created) return;
          const age = days(r.created, new Date());
          if (age <= 2) buckets["0–2 дня"]++;
          else if (age <= 7) buckets["3–7 дней"]++;
          else if (age <= 14) buckets["8–14 дней"]++;
          else buckets["15+ дней"]++;
        });
        destroyChart("deadlinesAge");
        charts.deadlinesAge = new Chart(byId("deadlinesAge"), { type:"bar", data:{labels:Object.keys(buckets), datasets:[{data:Object.values(buckets), backgroundColor:"#2563eb", borderRadius:8}]}, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}}, y:{beginAtZero:true, grid:{color:"#e2e8f0"}}}} });

        const risky = curr.filter(r=>!isClosed(r)&&r.deadline).map(r=>({...r, late:days(r.deadline, new Date())})).filter(r=>r.late>0).sort((a,b)=>b.late-a.late).slice(0,8);
        byId("deadlinesTable").innerHTML = `<thead><tr><th>Задача</th><th>Ответственный</th><th>Подразделение</th><th>Просрочка</th></tr></thead><tbody>${risky.map(r=>`<tr><td>${r.title}</td><td>${r.owner}</td><td>${r.unit}</td><td>+${r.late} дн</td></tr>`).join("") || `<tr><td colspan="4">Сильных просрочек нет</td></tr>`}</tbody>`;
      }

      function drawLoad(prev, curr) {
        const panel = byId("tab-load");
        panel.innerHTML = `<div class="panel-grid"><div class="charts-grid"><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Открытые задачи по подразделениям</h3><div class="chart-wrap"><canvas id="loadOpen"></canvas></div></article><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Изменение объёма: февраль → март</h3><div class="chart-wrap"><canvas id="loadDiff"></canvas></div></article></div><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4"><h3 class="text-base font-semibold mb-2">Матрица нагрузки</h3><table class="table-small" id="loadTable"></table></article></div>`;

        const open = curr.filter(r=>!isClosed(r));
        const topUnits = topN(grouped(open, r=>r.unit), 10);
        destroyChart("loadOpen");
        charts.loadOpen = new Chart(byId("loadOpen"), { type:"bar", data:{labels:topUnits.map(x=>x[0]), datasets:[{data:topUnits.map(x=>x[1]), backgroundColor:"#1d4ed8", borderRadius:8}]}, options:{maintainAspectRatio:false, indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true, grid:{color:"#e2e8f0"}}, y:{grid:{display:false}}}} });

        const prevM = grouped(prev, r=>r.unit), currM = grouped(curr, r=>r.unit);
        const allUnits = [...new Set([...prevM.keys(), ...currM.keys()])];
        const diff = allUnits.map(u => ({u, v:(currM.get(u)||0)-(prevM.get(u)||0)})).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v)).slice(0,10);
        destroyChart("loadDiff");
        charts.loadDiff = new Chart(byId("loadDiff"), { type:"bar", data:{labels:diff.map(x=>x.u), datasets:[{data:diff.map(x=>x.v), backgroundColor:diff.map(x=>x.v>=0?"#0ea5e9":"#ef4444"), borderRadius:8}]}, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}}, y:{grid:{color:"#e2e8f0"}}}} });

        const matrixUnits = topN(grouped(curr, r=>r.unit), 8).map(x=>x[0]);
        byId("loadTable").innerHTML = `<thead><tr><th>Подразделение</th><th>Уровень 1</th><th>Уровень 2</th><th>Уровень 3</th><th>Всего</th><th>Просрочка %</th></tr></thead><tbody>${matrixUnits.map(u=>{const rows=curr.filter(r=>r.unit===u);const l1=rows.filter(r=>r.level==="Уровень 1").length;const l2=rows.filter(r=>r.level==="Уровень 2").length;const l3=rows.filter(r=>r.level==="Уровень 3").length;const over=rows.filter(isOverdue).length;return `<tr><td>${u}</td><td>${l1}</td><td>${l2}</td><td>${l3}</td><td>${rows.length}</td><td>${(over/Math.max(rows.length,1)*100).toFixed(1)}%</td></tr>`;}).join("")}</tbody>`;
      }

      function drawQuality(curr) {
        const panel = byId("tab-quality");
        panel.innerHTML = `<div class="panel-grid"><div class="charts-grid"><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Причины задержек и возвратов</h3><div class="chart-wrap"><canvas id="qualityReasons"></canvas></div></article><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 chart-box"><h3 class="text-base font-semibold mb-2">Закрытие задач по неделям</h3><div class="chart-wrap"><canvas id="qualityWeeks"></canvas></div></article></div><article class="bg-white rounded-xl shadow-sm border border-slate-200 p-4"><h3 class="text-base font-semibold mb-2">Результаты по ответственным</h3><table class="table-small" id="qualityTable"></table></article></div>`;

        const reasons = topN(grouped(curr.filter(r => isOverdue(r) || /возврат/i.test(r.reason)).map(r => ({...r, reason: r.reason || "Причина не указана"})), r => r.reason), 8);
        destroyChart("qualityReasons");
        charts.qualityReasons = new Chart(byId("qualityReasons"), { type:"doughnut", data:{labels:reasons.map(x=>x[0]), datasets:[{data:reasons.map(x=>x[1]), backgroundColor:["#2563eb","#f59e0b","#ef4444","#10b981","#8b5cf6","#0ea5e9","#64748b","#14b8a6"]}]}, options:{maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}} });

        const weekMap = new Map();
        curr.forEach(r => {
          if (!isClosed(r) || !r.closed) return;
          const d = new Date(r.closed);
          const monday = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - ((d.getUTCDay() + 6) % 7))).toISOString().slice(0,10);
          weekMap.set(monday, (weekMap.get(monday) || 0) + 1);
        });
        const weekData = [...weekMap.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
        destroyChart("qualityWeeks");
        charts.qualityWeeks = new Chart(byId("qualityWeeks"), { type:"line", data:{labels:weekData.map(x=>x[0]), datasets:[{label:"Закрыто", data:weekData.map(x=>x[1]), borderColor:"#0ea5e9", backgroundColor:"rgba(14,165,233,.2)", fill:true, tension:.3, pointRadius:3}]}, options:{maintainAspectRatio:false, scales:{x:{grid:{display:false}}, y:{beginAtZero:true, grid:{color:"#e2e8f0"}}}} });

        const owners = topN(grouped(curr, r=>r.owner), 10);
        byId("qualityTable").innerHTML = `<thead><tr><th>Ответственный</th><th>Всего</th><th>Закрыто</th><th>Просрочка %</th></tr></thead><tbody>${owners.map(([o,total])=>{const rows=curr.filter(r=>r.owner===o);const cl=rows.filter(isClosed).length;const ov=rows.filter(isOverdue).length;return `<tr><td>${o}</td><td>${total}</td><td>${cl}</td><td>${(ov/Math.max(total,1)*100).toFixed(1)}%</td></tr>`;}).join("")}</tbody>`;
      }

      async function loadData() {
        const badge = byId("statusBadge");
        badge.className = "inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-700";
        badge.textContent = "Читаю файлы…";

        try {
          const [prevRes, currRes] = await Promise.all([fetch(expectedFiles.prev), fetch(expectedFiles.curr)]);
          if (!prevRes.ok || !currRes.ok) throw new Error("no files");
          const [prevBin, currBin] = await Promise.all([prevRes.arrayBuffer(), currRes.arrayBuffer()]);
          const prev = parseWorkbook(prevBin, "2026-02");
          const curr = parseWorkbook(currBin, "2026-03");
          render({ prev: prev.rows, curr: curr.rows, prevStats: prev.stats, currStats: curr.stats });
          badge.className = "inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700";
          badge.textContent = "Взяты реальные данные из Excel";
        } catch (e) {
          render(demoData());
          badge.className = "inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold bg-rose-100 text-rose-700";
          badge.textContent = "Файлы Excel не найдены рядом с HTML: показан демонстрационный режим";
        }
      }

      drawTabs();
      byId("reloadBtn").addEventListener("click", loadData);
      loadData();
    </script>
  </body>
</html>
